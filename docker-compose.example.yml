services:
  db:
    image: mariadb:11.4
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./app/database/init:/docker-entrypoint-initdb.d
    ports:
      - "${DB_PORT}:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

# --- TEMPORAL: adminer para verificacion de la DB durante evaluacion ----------
# Eliminar este servicio cuando ya no sea necesario para revision academica.
# El desarrollador tiene Adminer corriendo en un contenedor propio.
  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
# ------------------------------------------------------------------------------

volumes:
  mariadb_data:
